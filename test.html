<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firebase 接続テスト</title>
<style>
body { font-family:-apple-system,sans-serif; padding:2rem; max-width:500px; margin:0 auto; }
h1 { font-size:1.2rem; margin-bottom:1.5rem; }
.step { margin-bottom:1rem; padding:.875rem 1rem; border-radius:10px; border:1px solid #E2E8F0; background:#F8FAFC; }
.step-title { font-size:.8rem; font-weight:700; color:#64748B; margin-bottom:.3rem; }
.step-result { font-size:.95rem; font-weight:600; color:#475569; }
.ok  { background:#F0FDF4; border-color:#86EFAC; }
.ok  .step-result { color:#166534; }
.err { background:#FEF2F2; border-color:#FCA5A5; }
.err .step-result { color:#991B1B; }
button { margin-top:1.5rem; padding:.75rem 1.5rem; background:#4F46E5; color:white; border:none; border-radius:10px; font-size:1rem; cursor:pointer; }
</style>
</head>
<body>
<h1>🔍 Firebase 接続テスト</h1>
<div class="step" id="s1"><div class="step-title">STEP 1: Firebase SDK 読み込み</div><div class="step-result" id="r1">確認中…</div></div>
<div class="step" id="s2"><div class="step-title">STEP 2: Firebase 初期化</div><div class="step-result" id="r2">待機中</div></div>
<div class="step" id="s3"><div class="step-title">STEP 3: Realtime Database 書き込み</div><div class="step-result" id="r3">待機中</div></div>
<div class="step" id="s4"><div class="step-title">STEP 4: Realtime Database 読み込み</div><div class="step-result" id="r4">待機中</div></div>
<button onclick="location.reload()">もう一度テスト</button>

<script>
/* ================================================================
   ★ Firebase 設定をここに貼り付けてください（student / teacher 共通）
   ================================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyDrdXls9DSQdtRTu-7vf882lqM2h7Q37Gc",
  authDomain: "classroom-chat-59e41.firebaseapp.com",
  databaseURL: "https://classroom-chat-59e41-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "classroom-chat-59e41",
  storageBucket: "classroom-chat-59e41.firebasestorage.app",
  messagingSenderId: "532077903921",
  appId: "1:532077903921:web:0a8652ca1b2986435cd510"
};
/* ================================================================ */

function setStep(id, ok, msg) {
  document.getElementById('s'+id).className = 'step ' + (ok?'ok':'err');
  document.getElementById('r'+id).textContent = (ok?'✅ ':'❌ ') + msg;
}
function step1ok() {
  setStep(1, true, 'Firebase SDK 読み込み成功');
  try {
    firebase.initializeApp(firebaseConfig);
    setStep(2, true, '初期化成功（' + firebaseConfig.projectId + '）');
    runStep3();
  } catch(e) { setStep(2, false, 'エラー: ' + e.message); }
}
function step1err() {
  setStep(1, false, 'SDKの読み込み失敗 — ネット接続を確認してください');
}
function runStep3() {
  const db = firebase.database();
  const t = setTimeout(() => {
    setStep(3, false, 'タイムアウト（5秒）— databaseURL が間違っている可能性があります');
    setStep(4, false, 'STEP 3 失敗のためスキップ');
  }, 5000);
  db.ref('test_connection/ping').set({ time: Date.now() })
    .then(() => { clearTimeout(t); setStep(3, true, '書き込み成功！'); runStep4(db); })
    .catch(e => { clearTimeout(t); setStep(3, false, 'エラー: ' + e.message); setStep(4, false, 'スキップ'); });
}
function runStep4(db) {
  const t = setTimeout(() => setStep(4, false, 'タイムアウト（5秒）'), 5000);
  db.ref('test_connection/ping').get()
    .then(snap => {
      clearTimeout(t);
      snap.exists() ? setStep(4, true, '読み込み成功！Firebase は正常です 🎉') : setStep(4, false, 'データなし');
    })
    .catch(e => { clearTimeout(t); setStep(4, false, 'エラー: ' + e.message); });
}
</script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"
  onload="step1ok()" onerror="step1err()"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
</body>
</html>
