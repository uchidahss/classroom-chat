<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>授業チャット</title>
<style>
:root {
  --primary: #4F46E5;
  --primary-bg: #EEF2FF;
  --red: #EF4444;
  --red-bg: #FFF1F2;
  --red-border: #FECDD3;
  --surface: #FFFFFF;
  --bg: #F1F5F9;
  --border: #E2E8F0;
  --text: #1E293B;
  --muted: #64748B;
  --radius: 14px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body { font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN',sans-serif; background:var(--surface); color:var(--text); }

/* ===== LOADING ===== */
#loading { height:100dvh; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:1rem; }
.spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
#loading p { font-size:.9rem; color:var(--muted); }

/* ===== APP ===== */
#app { display:none; height:100dvh; flex-direction:column; overflow:hidden; }

/* Header */
.app-head { flex-shrink:0; background:var(--surface); border-bottom:1px solid var(--border); padding:0 1rem; }
.head-row { height:48px; display:flex; align-items:center; gap:.625rem; }
.room-pill { font-size:.7rem; font-weight:800; letter-spacing:.06rem; padding:.2rem .65rem; border-radius:100px; background:var(--primary-bg); color:var(--primary); }
.s-title { font-size:.9rem; font-weight:600; flex:1; }

/* Tabs */
.tabs { display:flex; }
.tab { flex:1; padding:.55rem 0; text-align:center; font-size:.82rem; font-weight:700; color:var(--muted); border-bottom:2.5px solid transparent; cursor:pointer; user-select:none; transition:color .15s, border-color .15s; }
.tab.active { color:var(--primary); border-bottom-color:var(--primary); }

/* Panels */
.panel { flex:1; display:none; flex-direction:column; overflow:hidden; }
.panel.active { display:flex; }

/* ===== REDSPA ZONE ===== */
#redspa-zone { flex-shrink:0; background:var(--red-bg); border-bottom:1px solid var(--red-border); display:none; }
.rs-card { padding:6px 12px 8px; border-bottom:1px solid var(--red-border); position:relative; overflow:hidden; }
.rs-card:last-child { border-bottom:none; }
.rs-name { font-size:.65rem; font-weight:800; color:#BE123C; margin-bottom:2px; display:flex; align-items:center; gap:4px; }
.rs-name::before { content:'🔴'; font-size:.7rem; }
.rs-text { font-size:.9rem; color:var(--text); line-height:1.4; word-break:break-word; }
.rs-bar { position:absolute; bottom:0; left:0; height:3px; background:var(--red); }

/* ===== CHAT ===== */
#chat-wrap { flex:1; position:relative; overflow:hidden; }
#msgs { height:100%; overflow-y:auto; padding:.875rem .875rem .5rem; display:flex; flex-direction:column; gap:.55rem; scroll-behavior:smooth; }
#msgs-empty { margin:auto; text-align:center; color:var(--muted); font-size:.85rem; line-height:2; }
.msg { display:flex; flex-direction:column; animation:fadeUp .28s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.msg.mine { align-items:flex-end; }
.msg-name { font-size:.66rem; font-weight:700; margin-bottom:.2rem; padding:0 .35rem; color:var(--muted); }
.msg-bubble { max-width:78%; padding:.55rem .85rem; border-radius:16px 16px 16px 4px; background:var(--bg); font-size:.93rem; line-height:1.5; word-break:break-word; }
.msg.mine .msg-bubble { border-radius:16px 16px 4px 16px; background:var(--primary-bg); color:var(--primary); }

/* Emoji float */
#emoji-overlay { position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:10; }
.float-emoji { position:absolute; bottom:10%; font-size:1.8rem; pointer-events:none; line-height:1; animation:floatUp 2.5s ease-out forwards; }
@keyframes floatUp {
  0%   { opacity:1;   transform:translateY(0)     translateX(0); }
  25%  { opacity:.9;  transform:translateY(-11vh) translateX(var(--d1)); }
  60%  { opacity:.65; transform:translateY(-28vh) translateX(var(--d2)); }
  100% { opacity:0;   transform:translateY(-44vh) translateX(var(--d3)); }
}

/* Reaction strip */
.react-strip { flex-shrink:0; padding:.4rem .875rem; border-top:1px solid var(--border); display:flex; gap:.35rem; overflow-x:auto; }
.react-strip::-webkit-scrollbar { display:none; }
.r-btn { flex-shrink:0; width:40px; height:40px; background:var(--bg); border:1.5px solid var(--border); border-radius:10px; cursor:pointer; font-size:1.2rem; display:flex; align-items:center; justify-content:center; }
.r-btn:active { background:var(--primary-bg); border-color:var(--primary); transform:scale(.88); }

/* Input bar */
.input-bar { flex-shrink:0; padding:.6rem .875rem .75rem; display:flex; gap:.45rem; align-items:flex-end; border-top:1px solid var(--border); background:var(--surface); }
#msg-input { flex:1; padding:.65rem .9rem; border:1.5px solid var(--border); border-radius:var(--radius); font-size:.93rem; font-family:inherit; outline:none; resize:none; max-height:90px; line-height:1.5; background:var(--bg); transition:border-color .2s; }
#msg-input:focus { border-color:var(--primary); background:var(--surface); }
.plane-btn { width:40px; height:40px; flex-shrink:0; border:none; border-radius:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.plane-btn:active { transform:scale(.9); }
.plane-btn:disabled { opacity:.35; pointer-events:none; }
#send-btn { background:var(--primary); }
#redspa-btn { background:var(--red); }
#redspa-btn.cooling { background:#94A3B8; cursor:not-allowed; flex-direction:column; }
#redspa-btn.cooling .cd-text { font-size:.58rem; color:white; font-weight:700; line-height:1.2; }
.plane-svg { width:18px; height:18px; fill:white; }

/* ===== POLL PANEL ===== */
#panel-poll { background:var(--bg); }
.poll-body { flex:1; overflow-y:auto; padding:1rem .875rem; display:flex; flex-direction:column; gap:1rem; }
.poll-sect-label { font-size:.72rem; font-weight:700; color:var(--muted); margin-bottom:.5rem; }
.vote-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:.4rem; }
.v-btn { padding:.85rem .2rem; background:var(--surface); border:1.5px solid var(--border); border-radius:12px; cursor:pointer; font-size:1rem; font-weight:800; color:var(--muted); transition:all .15s; }
.v-btn:active { transform:scale(.92); }
.v-btn.voted { background:var(--primary); color:white; border-color:var(--primary); }
.result-rows { display:flex; flex-direction:column; gap:.5rem; }
.r-row { display:flex; align-items:center; gap:.6rem; }
.r-num { font-size:.85rem; font-weight:800; color:var(--text); width:20px; text-align:right; flex-shrink:0; }
.r-track { flex:1; height:28px; background:var(--border); border-radius:6px; overflow:hidden; }
.r-fill { height:100%; background:var(--primary); border-radius:6px; transition:width .5s ease; width:0%; }
.r-count { font-size:.78rem; color:var(--muted); width:26px; text-align:right; flex-shrink:0; }
.result-total { font-size:.75rem; color:var(--muted); text-align:right; margin-top:.2rem; }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>接続中…</p>
</div>

<div id="app">
  <div class="app-head">
    <div class="head-row">
      <span class="room-pill">授業中</span>
      <span class="s-title" id="s-title">チャット</span>
    </div>
    <div class="tabs">
      <div class="tab active" data-tab="chat">💬 チャット</div>
      <div class="tab"        data-tab="poll">📊 アンケート</div>
    </div>
  </div>

  <div class="panel active" id="panel-chat">
    <div id="redspa-zone"></div>
    <div id="chat-wrap">
      <div id="msgs"><div id="msgs-empty">💬 メッセージを送ってみましょう</div></div>
      <div id="emoji-overlay"></div>
    </div>
    <div class="react-strip">
      <button class="r-btn" data-e="👍">👍</button>
      <button class="r-btn" data-e="👎">👎</button>
      <button class="r-btn" data-e="👏">👏</button>
      <button class="r-btn" data-e="❤️">❤️</button>
      <button class="r-btn" data-e="💦">💦</button>
      <button class="r-btn" data-e="😊">😊</button>
      <button class="r-btn" data-e="😮">😮</button>
      <button class="r-btn" data-e="😭">😭</button>
      <button class="r-btn" data-e="🤣">🤣</button>
    </div>
    <div class="input-bar">
      <textarea id="msg-input" placeholder="メッセージを入力…" rows="1"></textarea>
      <button id="send-btn" class="plane-btn" disabled>
        <svg class="plane-svg" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
      <button id="redspa-btn" class="plane-btn">
        <svg class="plane-svg" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <div class="panel" id="panel-poll">
    <div class="poll-body">
      <div>
        <div class="poll-sect-label">回答する（1〜10）</div>
        <div class="vote-grid" id="vote-grid"></div>
      </div>
      <div>
        <div class="poll-sect-label">みんなの回答</div>
        <div class="result-rows" id="result-rows"></div>
        <div class="result-total" id="result-total">回答 0 件</div>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<script>
/* ================================================================
   ★ Firebase 設定をここに貼り付けてください（student / teacher 共通）
   ================================================================ */
const firebaseConfig = {
  apiKey:            "AIzaSyDrdXls9DSQdtRTu-7vf882lqM2h7Q37Gc",
  authDomain:        "classroom-chat-59e41.firebaseapp.com",
  databaseURL:       "https://classroom-chat-59e41-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "YOUR_PROJECT_ID",
  storageBucket:     "YOUR_PROJECT_ID.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId:             "YOUR_APP_ID"
};
/* ================================================================ */
   ★ ルーム名（teacher.html と同じ値にすること）
   ================================================================ */
const ROOM = "MYCLASS";
/* ================================================================ */

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 匿名ID
const ANIMALS = ['ネコ','イヌ','パンダ','キツネ','ウサギ','タヌキ','クマ','トリ','カエル','ゾウ','ライオン','コアラ','ペンギン','ハムスター','サル','クジラ'];
const COLORS   = ['#4F46E5','#0891B2','#059669','#D97706','#DC2626','#7C3AED','#DB2777','#065F46'];
const myName   = ANIMALS[Math.floor(Math.random()*ANIMALS.length)];
const myColor  = COLORS[Math.floor(Math.random()*COLORS.length)];
const myId     = Math.random().toString(36).slice(2,9);
let pollVotes  = {};
let emojiCount = 0;
let cooldownTimer = null;
const redspas  = [];

const $  = id => document.getElementById(id);
const msgsEl  = $('msgs');
const rzone   = $('redspa-zone');

// ---- Build poll UI ----
const vg = $('vote-grid'), rr = $('result-rows');
for (let i = 1; i <= 10; i++) {
  const btn = document.createElement('button');
  btn.className='v-btn'; btn.dataset.v=i; btn.textContent=i;
  vg.appendChild(btn);
  rr.insertAdjacentHTML('beforeend',
    `<div class="r-row"><span class="r-num">${i}</span><div class="r-track"><div class="r-fill" id="rf${i}"></div></div><span class="r-count" id="rc${i}">0</span></div>`);
}

// ---- Tabs ----
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    $('panel-' + tab.dataset.tab).classList.add('active');
  });
});

// ---- 即時起動 ----
$('loading').style.display = 'none';
$('app').style.display     = 'flex';
checkCooldown();
startListening();
db.ref(`classrooms/${ROOM}/settings`).get().then(snap => {
  if (snap.exists() && snap.val().subject) $('s-title').textContent = snap.val().subject;
}).catch(() => {});

// ---- Listeners ----
function startListening() {
  const t0 = Date.now();
  let ready = false;
  setTimeout(() => ready = true, 400);

  db.ref(`classrooms/${ROOM}/messages`)
    .orderByChild('timestamp').startAt(t0)
    .on('child_added', snap => { if (ready) renderMsg(snap.val()); });

  db.ref(`classrooms/${ROOM}/redspas`)
    .orderByChild('timestamp').startAt(t0)
    .on('child_added', snap => { if (ready) showRedspa(snap.val()); });

  db.ref(`classrooms/${ROOM}/emojis`)
    .orderByChild('timestamp').startAt(t0)
    .on('child_added', snap => { if (ready) spawnEmoji(snap.val().emoji); });

  db.ref(`classrooms/${ROOM}/pollVotes`).on('value', snap => {
    pollVotes = {};
    snap.forEach(c => { const v = c.val().value; if (v >= 1 && v <= 10) pollVotes[v] = (pollVotes[v] || 0) + 1; });
    updatePollChart();
  });

  db.ref(`classrooms/${ROOM}/clearSignal`).on('value', snap => {
    if (!snap.val()) return;
    clearChatDisplay();
  });
}

// ---- Render / Clear ----
function renderMsg(msg) {
  $('msgs-empty').style.display = 'none';
  const isMine = msg.studentId === myId;
  const wrap = document.createElement('div');
  wrap.className = 'msg' + (isMine ? ' mine' : '');
  const name = document.createElement('div');
  name.className = 'msg-name';
  name.style.color = msg.color || '#64748B';
  name.textContent = isMine ? '自分' : msg.name;
  wrap.appendChild(name);
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = msg.text;
  if (!isMine) bubble.style.borderLeft = `3px solid ${msg.color || '#CBD5E1'}`;
  wrap.appendChild(bubble);
  msgsEl.appendChild(wrap);
  msgsEl.scrollTop = msgsEl.scrollHeight;
  const all = msgsEl.querySelectorAll('.msg');
  while (all.length > 50) { const f = msgsEl.querySelector('.msg'); if (f) f.remove(); }
}

function clearChatDisplay() {
  msgsEl.querySelectorAll('.msg').forEach(m => m.remove());
  $('msgs-empty').style.display = 'block';
  while (redspas.length) evictOldestRedspa();
}

// ---- Push ----
function push(data) {
  db.ref(`classrooms/${ROOM}/messages`).push({
    ...data, studentId: myId, name: myName, color: myColor, timestamp: Date.now()
  });
}

// ---- Text send ----
const sendBtn = $('send-btn'), msgInput = $('msg-input');
sendBtn.addEventListener('click', doSend);
msgInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); } });
msgInput.addEventListener('input', () => {
  sendBtn.disabled = !msgInput.value.trim();
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 90) + 'px';
});

function doSend() {
  const t = msgInput.value.trim();
  if (!t) return;
  push({ type: 'text', text: t });
  msgInput.value = ''; msgInput.style.height = 'auto'; sendBtn.disabled = true;
}

// ---- Reactions ----
document.querySelector('.react-strip').addEventListener('click', e => {
  const btn = e.target.closest('.r-btn');
  if (!btn) return;
  db.ref(`classrooms/${ROOM}/emojis`).push({ emoji: btn.dataset.e, timestamp: Date.now() });
  btn.style.transform = 'scale(.82)';
  setTimeout(() => btn.style.transform = '', 180);
});

// ---- Emoji float ----
function spawnEmoji(emoji) {
  if (emojiCount >= 10) return;
  emojiCount++;
  const overlay = $('emoji-overlay');
  const el = document.createElement('div');
  el.className = 'float-emoji';
  el.textContent = emoji;
  const x  = 10 + Math.random() * 70;
  const d1 = (Math.random() - .5) * 30;
  const d2 = (Math.random() - .5) * 50;
  const d3 = (Math.random() - .5) * 25;
  el.style.cssText = `left:${x}%; --d1:${d1}px; --d2:${d2}px; --d3:${d3}px;`;
  overlay.appendChild(el);
  setTimeout(() => { el.remove(); emojiCount--; }, 2500);
}

// ---- Red supa ----
function showRedspa(msg) {
  if (redspas.length >= 3) evictOldestRedspa();
  const card = document.createElement('div');
  card.className = 'rs-card';
  card.innerHTML = `<div class="rs-name">${esc(msg.name)}</div><div class="rs-text">${esc(msg.text)}</div><div class="rs-bar" style="width:100%;transition:width 10s linear;"></div>`;
  rzone.appendChild(card);
  rzone.style.display = 'block';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const b = card.querySelector('.rs-bar');
    if (b) b.style.width = '0%';
  }));
  const tid = setTimeout(() => removeRedspa(card, tid), 10000);
  redspas.push({ el: card, timerId: tid });
}

function evictOldestRedspa() {
  const o = redspas.shift();
  if (!o) return;
  clearTimeout(o.timerId);
  o.el.remove();
  if (!rzone.children.length) rzone.style.display = 'none';
}

function removeRedspa(card, tid) {
  const idx = redspas.findIndex(r => r.timerId === tid);
  if (idx > -1) redspas.splice(idx, 1);
  card.remove();
  if (!rzone.children.length) rzone.style.display = 'none';
}

// ---- Cooldown ----
function checkCooldown() {
  db.ref(`classrooms/${ROOM}/redspa_cd/${myId}`).get().then(snap => {
    if (!snap.exists()) return;
    const rem = snap.val() - Date.now();
    if (rem > 0) startCooldownUI(rem);
  });
}

function startCooldownUI(ms) {
  const btn = $('redspa-btn');
  btn.classList.add('cooling');
  btn.innerHTML = '<span class="cd-text">--:--</span>';
  if (cooldownTimer) clearInterval(cooldownTimer);
  let rem = Math.ceil(ms / 1000);
  const tick = () => {
    if (rem <= 0) {
      clearInterval(cooldownTimer);
      btn.classList.remove('cooling');
      btn.innerHTML = '<svg class="plane-svg" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>';
      return;
    }
    const cd = btn.querySelector('.cd-text');
    if (cd) cd.textContent = `${Math.floor(rem/60)}:${String(rem%60).padStart(2,'0')}`;
    rem--;
  };
  tick();
  cooldownTimer = setInterval(tick, 1000);
}

$('redspa-btn').addEventListener('click', () => {
  const btn = $('redspa-btn');
  if (btn.classList.contains('cooling')) return;
  const text = msgInput.value.trim();
  if (!text) { msgInput.focus(); return; }
  db.ref(`classrooms/${ROOM}/redspas`).push({ text, name: myName, color: myColor, studentId: myId, timestamp: Date.now() });
  db.ref(`classrooms/${ROOM}/redspa_cd/${myId}`).set(Date.now() + 5 * 60 * 1000);
  startCooldownUI(5 * 60 * 1000);
  msgInput.value = ''; msgInput.style.height = 'auto'; sendBtn.disabled = true;
});

// ---- Poll ----
$('vote-grid').addEventListener('click', e => {
  const btn = e.target.closest('.v-btn');
  if (!btn) return;
  const v = parseInt(btn.dataset.v);
  db.ref(`classrooms/${ROOM}/pollVotes/${myId}`).set({ value: v, timestamp: Date.now() });
  document.querySelectorAll('.v-btn').forEach(b => b.classList.remove('voted'));
  btn.classList.add('voted');
});

function updatePollChart() {
  const total = Object.values(pollVotes).reduce((a, b) => a + b, 0);
  for (let i = 1; i <= 10; i++) {
    const pct = total > 0 ? Math.round((pollVotes[i] || 0) / total * 100) : 0;
    $(`rf${i}`).style.width = pct + '%';
    $(`rc${i}`).textContent = pollVotes[i] || 0;
  }
  $('result-total').textContent = `回答 ${total} 件`;
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
