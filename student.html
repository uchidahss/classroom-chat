<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>授業チャット</title>
<style>
:root {
  --primary: #4F46E5;
  --primary-bg: #EEF2FF;
  --red: #EF4444;
  --red-bg: #FFF1F2;
  --red-border: #FECDD3;
  --surface: #FFFFFF;
  --bg: #F1F5F9;
  --border: #E2E8F0;
  --text: #1E293B;
  --muted: #64748B;
  --radius: 14px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body { font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN',sans-serif; background:var(--surface); color:var(--text); }

#loading { height:100dvh; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:1rem; }
.spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
#loading p { font-size:.9rem; color:var(--muted); }

#name-screen { height:100dvh; display:none; flex-direction:column; align-items:center; justify-content:center; padding:2rem 1.5rem; gap:1.75rem; background:var(--surface); }
.name-icon { width:68px; height:68px; border-radius:20px; background:var(--primary); display:flex; align-items:center; justify-content:center; }
.name-icon svg { width:34px; height:34px; fill:white; }
.name-title { text-align:center; }
.name-title h1 { font-size:1.4rem; font-weight:700; margin-bottom:.4rem; }
.name-title p { font-size:.88rem; color:var(--muted); line-height:1.6; }
.name-form { width:100%; max-width:280px; display:flex; flex-direction:column; gap:.875rem; }
#name-input { width:100%; padding:.85rem 1rem; font-size:1rem; border:2px solid var(--border); border-radius:var(--radius); outline:none; background:var(--bg); font-family:inherit; transition:border-color .2s; }
#name-input:focus { border-color:var(--primary); background:var(--surface); }
#name-btn { width:100%; padding:.9rem; background:var(--primary); color:white; border:none; border-radius:var(--radius); font-size:1rem; font-weight:700; cursor:pointer; }
#name-btn:active { opacity:.85; }
#name-btn:disabled { opacity:.45; pointer-events:none; }

#app { display:none; position:fixed; top:0; left:0; right:0; bottom:0; flex-direction:column; overflow:hidden; }

.app-head { flex-shrink:0; background:var(--surface); border-bottom:1px solid var(--border); padding:0 1rem; }
.head-row { height:48px; display:flex; align-items:center; gap:.625rem; }
.room-pill { font-size:.7rem; font-weight:800; letter-spacing:.06rem; padding:.2rem .65rem; border-radius:100px; background:var(--primary-bg); color:var(--primary); }
.s-title { font-size:.9rem; font-weight:600; flex:1; }
.status-dot { width:8px; height:8px; border-radius:50%; background:#94A3B8; flex-shrink:0; transition:background .3s; }
.status-dot.live { background:#22C55E; }

.tabs { display:flex; }
.tab { flex:1; padding:.55rem 0; text-align:center; font-size:.82rem; font-weight:700; color:var(--muted); border-bottom:2.5px solid transparent; cursor:pointer; user-select:none; transition:color .15s, border-color .15s; }
.tab.active { color:var(--primary); border-bottom-color:var(--primary); }

.panel { flex:1; display:none; flex-direction:column; overflow:hidden; }
.panel.active { display:flex; }

/* 待機バナー */
#wait-banner {
  display:none;
  flex-shrink:0;
  background:#FFF7ED;
  border-bottom:1px solid #FED7AA;
  padding:.55rem 1rem;
  font-size:.82rem;
  color:#C2410C;
  font-weight:600;
  text-align:center;
}

#redspa-zone { flex-shrink:0; background:var(--red-bg); border-bottom:1px solid var(--red-border); display:none; }
.rs-card { padding:6px 12px 8px; border-bottom:1px solid var(--red-border); position:relative; overflow:hidden; }
.rs-card:last-child { border-bottom:none; }
.rs-name { font-size:.65rem; font-weight:800; color:#BE123C; margin-bottom:2px; display:flex; align-items:center; gap:4px; }
.rs-name::before { content:'🔴'; font-size:.7rem; }
.rs-text { font-size:.9rem; color:var(--text); line-height:1.4; word-break:break-word; }
.rs-bar { position:absolute; bottom:0; left:0; height:3px; background:var(--red); }

#chat-wrap { flex:1; position:relative; overflow:hidden; }
#msgs { height:100%; overflow-y:auto; padding:.875rem .875rem .5rem; display:flex; flex-direction:column; gap:.5rem; scroll-behavior:smooth; }
#msgs-empty { margin:auto; text-align:center; color:var(--muted); font-size:.85rem; line-height:2; }

.msg { display:flex; flex-direction:column; animation:fadeUp .28s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.msg.mine  { align-items:flex-end; }
.msg.other { align-items:flex-start; }
.msg-name { font-size:.67rem; font-weight:700; margin-bottom:.2rem; padding:0 .35rem; }
.msg-bubble { max-width:78%; padding:.55rem .85rem; border-radius:16px; font-size:.93rem; line-height:1.5; word-break:break-word; }

#emoji-overlay { position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:10; }
.float-emoji { position:absolute; bottom:10%; font-size:1.8rem; pointer-events:none; line-height:1; animation:floatUp 2.5s ease-out forwards; }
@keyframes floatUp {
  0%   { opacity:1; transform:translateY(0)     translateX(0); }
  100% { opacity:0; transform:translateY(-44vh) translateX(var(--d1)); }
}

.react-strip { flex-shrink:0; padding:.4rem .875rem; border-top:1px solid var(--border); display:flex; gap:.35rem; overflow-x:auto; }
.react-strip::-webkit-scrollbar { display:none; }
.r-btn { flex-shrink:0; width:40px; height:40px; background:var(--bg); border:1.5px solid var(--border); border-radius:10px; cursor:pointer; font-size:1.2rem; display:flex; align-items:center; justify-content:center; }
.r-btn:active { background:var(--primary-bg); border-color:var(--primary); transform:scale(.88); }
.r-btn:disabled { opacity:.35; pointer-events:none; }

.input-bar { flex-shrink:0; padding:.6rem .875rem .75rem; display:flex; gap:.45rem; align-items:flex-end; border-top:1px solid var(--border); background:var(--surface); }
#msg-input { flex:1; padding:.65rem .9rem; border:1.5px solid var(--border); border-radius:var(--radius); font-size:.93rem; font-family:inherit; outline:none; resize:none; max-height:90px; line-height:1.5; background:var(--bg); transition:border-color .2s; }
#msg-input:focus { border-color:var(--primary); background:var(--surface); }
#msg-input:disabled { opacity:.5; cursor:not-allowed; }
.plane-btn { width:40px; height:40px; flex-shrink:0; border:none; border-radius:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.plane-btn:active { transform:scale(.9); }
.plane-btn:disabled { opacity:.35; pointer-events:none; }
#send-btn { background:var(--primary); }
#redspa-btn { background:var(--red); }
#redspa-btn.cooling { background:#94A3B8; cursor:not-allowed; flex-direction:column; }
#redspa-btn.cooling .cd-text { font-size:.58rem; color:white; font-weight:700; line-height:1.2; }
.plane-svg { width:18px; height:18px; fill:white; }

#panel-poll { background:var(--bg); }
.poll-body { flex:1; overflow-y:auto; padding:1rem .875rem; display:flex; flex-direction:column; gap:1rem; }
.poll-sect-label { font-size:.72rem; font-weight:700; color:var(--muted); margin-bottom:.5rem; }
.vote-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:.4rem; }
.v-btn { padding:.85rem .2rem; background:var(--surface); border:1.5px solid var(--border); border-radius:12px; cursor:pointer; font-size:1rem; font-weight:800; color:var(--muted); transition:all .15s; }
.v-btn:active { transform:scale(.92); }
.v-btn.voted { background:var(--primary); color:white; border-color:var(--primary); }
.v-btn:disabled { opacity:.35; pointer-events:none; }
.result-rows { display:flex; flex-direction:column; gap:.5rem; }
.r-row { display:flex; align-items:center; gap:.6rem; }
.r-num { font-size:.85rem; font-weight:800; color:var(--text); width:20px; text-align:right; flex-shrink:0; }
.r-track { flex:1; height:28px; background:var(--border); border-radius:6px; overflow:hidden; }
.r-fill { height:100%; background:var(--primary); border-radius:6px; transition:width .5s ease; width:0%; }
.r-count { font-size:.78rem; color:var(--muted); width:26px; text-align:right; flex-shrink:0; }
.result-total { font-size:.75rem; color:var(--muted); text-align:right; margin-top:.2rem; }

#panel-qa { background:var(--bg); }
.qa-body { flex:1; overflow-y:auto; padding:1rem .875rem; display:flex; flex-direction:column; gap:.875rem; }
.qa-input-wrap { display:flex; flex-direction:column; gap:.5rem; }
#qa-input { width:100%; padding:.75rem .9rem; border:1.5px solid var(--border); border-radius:var(--radius); font-size:.93rem; font-family:inherit; outline:none; resize:none; max-height:100px; line-height:1.5; background:var(--surface); transition:border-color .2s; }
#qa-input:focus { border-color:var(--primary); background:var(--surface); }
#qa-input:disabled { opacity:.5; cursor:not-allowed; }
#qa-send { width:100%; padding:.7rem; background:var(--primary); color:white; border:none; border-radius:var(--radius); font-size:.9rem; font-weight:700; cursor:pointer; }
#qa-send:disabled { opacity:.35; pointer-events:none; }
#qa-send:active { opacity:.85; }
.qa-list { display:flex; flex-direction:column; gap:.625rem; }
.qa-card { background:var(--surface); border-radius:var(--radius); padding:.75rem 1rem; border:1px solid var(--border); position:relative; animation:fadeUp .28s ease; }
.qa-card.answered { opacity:.45; }
.qa-card-name { font-size:.67rem; font-weight:700; margin-bottom:.3rem; }
.qa-card-text { font-size:.93rem; line-height:1.5; word-break:break-word; color:var(--text); }
.qa-card-del { position:absolute; top:.6rem; right:.75rem; background:none; border:none; cursor:pointer; font-size:.85rem; color:var(--muted); padding:2px 4px; border-radius:4px; }
.qa-card-del:active { color:var(--red); }
.qa-empty { text-align:center; color:var(--muted); font-size:.85rem; padding:2rem 0; }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>接続中…</p>
</div>

<div id="name-screen">
  <div class="name-icon">
    <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
  </div>
  <div class="name-title">
    <h1>授業チャット</h1>
    <p>表示名を入力してください<br>匿名・ニックネームでも大丈夫です</p>
  </div>
  <div class="name-form">
    <input id="name-input" type="text" placeholder="例: 山田 / たろう / 匿名" maxlength="20" autocomplete="off">
    <button id="name-btn" disabled>参加する →</button>
  </div>
</div>

<div id="app">
  <div class="app-head">
    <div class="head-row">
      <span class="room-pill">授業中</span>
      <span class="s-title" id="s-title">チャット</span>
      <div class="status-dot" id="status-dot"></div>
    </div>
    <div class="tabs">
      <div class="tab active" data-tab="chat">💬 チャット</div>
      <div class="tab"        data-tab="poll">📊 アンケート</div>
      <div class="tab"        data-tab="qa">❓ Q&amp;A</div>
    </div>
  </div>

  <div class="panel active" id="panel-chat">
    <div id="wait-banner">⏳ 先生が授業を開始するまでお待ちください</div>
    <div id="redspa-zone"></div>
    <div id="chat-wrap">
      <div id="msgs"><div id="msgs-empty">💬 メッセージを送ってみましょう</div></div>
      <div id="emoji-overlay"></div>
    </div>
    <div class="react-strip">
      <button class="r-btn" data-e="👍">👍</button>
      <button class="r-btn" data-e="👎">👎</button>
      <button class="r-btn" data-e="👏">👏</button>
      <button class="r-btn" data-e="❤️">❤️</button>
      <button class="r-btn" data-e="💦">💦</button>
      <button class="r-btn" data-e="😊">😊</button>
      <button class="r-btn" data-e="😮">😮</button>
      <button class="r-btn" data-e="😭">😭</button>
      <button class="r-btn" data-e="🤣">🤣</button>
    </div>
    <div class="input-bar">
      <textarea id="msg-input" placeholder="メッセージを入力…" rows="1"></textarea>
      <button id="send-btn" class="plane-btn" disabled>
        <svg class="plane-svg" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
      <button id="redspa-btn" class="plane-btn">
        <svg class="plane-svg" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <div class="panel" id="panel-poll">
    <div class="poll-body">
      <div>
        <div class="poll-sect-label">回答する（1〜10）</div>
        <div class="vote-grid" id="vote-grid"></div>
      </div>
      <div>
        <div class="poll-sect-label">みんなの回答</div>
        <div class="result-rows" id="result-rows"></div>
        <div class="result-total" id="result-total">回答 0 件</div>
      </div>
    </div>
  </div>

  <div class="panel" id="panel-qa">
    <div class="qa-body">
      <div class="qa-input-wrap">
        <textarea id="qa-input" placeholder="質問を入力してください…" rows="2"></textarea>
        <button id="qa-send" disabled>質問を投稿する</button>
      </div>
      <div class="qa-list" id="qa-list">
        <div class="qa-empty" id="qa-empty">まだ質問はありません</div>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey:            "AIzaSyDrdXls9DSQdtRTu-7vf882lqM2h7Q37Gc",
  authDomain:        "classroom-chat-59e41.firebaseapp.com",
  databaseURL:       "https://classroom-chat-59e41-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "classroom-chat-59e41",
  storageBucket:     "classroom-chat-59e41.firebasestorage.app",
  messagingSenderId: "532077903921",
  appId:             "1:532077903921:web:0a8652ca1b2986435cd510"
};

const ROOM = "MYCLASS";

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const COLORS = ['#4F46E5','#0891B2','#059669','#D97706','#DC2626','#7C3AED','#DB2777','#065F46'];

// sessionStorage で状態を復元（リロード対応）
let myName  = sessionStorage.getItem('myName')  || '';
let myColor = sessionStorage.getItem('myColor') || COLORS[Math.floor(Math.random()*COLORS.length)];
let myId    = sessionStorage.getItem('myId')    || Math.random().toString(36).slice(2,9);
sessionStorage.setItem('myColor', myColor);
sessionStorage.setItem('myId',    myId);
let pollVotes   = {};
let emojiCount  = 0;
let cooldownTimer = null;
let classActive = false;
const redspas   = [];

const $      = id => document.getElementById(id);
const msgsEl = $('msgs');
const rzone  = $('redspa-zone');

// ---- Poll UI ----
const vg = $('vote-grid'), rr = $('result-rows');
for (let i = 1; i <= 10; i++) {
  const btn = document.createElement('button');
  btn.className='v-btn'; btn.dataset.v=i; btn.textContent=i;
  vg.appendChild(btn);
  rr.insertAdjacentHTML('beforeend',
    `<div class="r-row"><span class="r-num">${i}</span><div class="r-track"><div class="r-fill" id="rf${i}"></div></div><span class="r-count" id="rc${i}">0</span></div>`);
}

// ---- Tabs ----
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    $('panel-' + tab.dataset.tab).classList.add('active');
  });
});

// ---- 名前入力 or 自動復帰 ----
const nameInput = $('name-input');
const nameBtn   = $('name-btn');

nameInput.addEventListener('input', () => {
  nameBtn.disabled = !nameInput.value.trim();
});
nameInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && nameInput.value.trim()) startApp();
});
nameBtn.addEventListener('click', startApp);

function startApp() {
  const val = nameInput.value.trim();
  if (!val) return;
  myName = val;
  sessionStorage.setItem('myName', myName);
  launchApp();
}

function launchApp() {
  $('loading').style.display     = 'none';
  $('name-screen').style.display = 'none';
  $('app').style.display         = 'flex';
  setActive(false);
  checkCooldown();
  startListening();
  db.ref(`classrooms/${ROOM}/settings`).get().then(snap => {
    if (snap.exists() && snap.val().subject) $('s-title').textContent = snap.val().subject;
  }).catch(() => {});
  // キーボード表示時に入力欄がキーボードのすぐ上に来るよう高さのみ調整
  if (window.visualViewport) {
    const adjustHeight = () => {
      $('app').style.height = window.visualViewport.height + 'px';
    };
    window.visualViewport.addEventListener('resize', adjustHeight);
    adjustHeight();
  }
}

// リロード時は名前入力をスキップ
if (myName) {
  launchApp();
} else {
  $('loading').style.display    = 'none';
  $('name-screen').style.display = 'flex';
}

// ---- アクティブ状態の切り替え ----
function setActive(isActive) {
  classActive = isActive;
  const dot    = $('status-dot');
  const banner = $('wait-banner');
  const input  = $('msg-input');
  const sendB  = $('send-btn');
  const redB   = $('redspa-btn');

  if (isActive) {
    dot.classList.add('live');
    banner.style.display = 'none';
    input.disabled = false;
    if (!redB.classList.contains('cooling')) redB.disabled = false;
    document.querySelectorAll('.r-btn').forEach(b => b.disabled = false);
    document.querySelectorAll('.v-btn').forEach(b => b.disabled = false);
    $('qa-input').disabled = false;
    updateQaSendBtn();
  } else {
    dot.classList.remove('live');
    banner.style.display = 'block';
    input.disabled = true;
    sendB.disabled = true;
    redB.disabled  = true;
    document.querySelectorAll('.r-btn').forEach(b => b.disabled = true);
    document.querySelectorAll('.v-btn').forEach(b => b.disabled = true);
    $('qa-input').disabled = true;
    $('qa-send').disabled = true;
  }
}

// ---- Listeners ----
function startListening() {
  const t0 = Date.now();
  let ready = false;
  setTimeout(() => ready = true, 400);

  // アクティブフラグ監視
  db.ref(`classrooms/${ROOM}/active`).on('value', snap => {
    setActive(snap.val() === true);
  });

  db.ref(`classrooms/${ROOM}/messages`)
    .orderByChild('timestamp').startAt(t0)
    .on('child_added', snap => { if (ready) renderMsg(snap.val()); });

  db.ref(`classrooms/${ROOM}/redspas`)
    .orderByChild('timestamp').startAt(t0)
    .on('child_added', snap => { if (ready) showRedspa(snap.val()); });

  db.ref(`classrooms/${ROOM}/emojis`)
    .orderByChild('timestamp').startAt(t0)
    .on('child_added', snap => { if (ready) spawnEmoji(snap.val().emoji); });

  db.ref(`classrooms/${ROOM}/pollVotes`).on('value', snap => {
    pollVotes = {};
    snap.forEach(c => { const v = c.val().value; if (v >= 1 && v <= 10) pollVotes[v] = (pollVotes[v] || 0) + 1; });
    updatePollChart();
  });

  db.ref(`classrooms/${ROOM}/clearSignal`).on('value', snap => {
    if (!snap.val()) return;
    clearChatDisplay();
  });

  const qaRef = db.ref(`classrooms/${ROOM}/qa`).orderByChild('timestamp');
  qaRef.on('child_added',   snap => { addQaCard(snap.key, snap.val()); });
  qaRef.on('child_changed', snap => { updateQaCard(snap.key, snap.val()); });
  qaRef.on('child_removed', snap => { removeQaCard(snap.key); });
}

// ---- カラー → 薄い背景色 ----
function faintBg(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},0.13)`;
}

// ---- Render message ----
function renderMsg(msg) {
  $('msgs-empty').style.display = 'none';
  const isMine = msg.studentId === myId;
  const color  = msg.color || '#4F46E5';
  const wrap   = document.createElement('div');
  wrap.className = 'msg ' + (isMine ? 'mine' : 'other');
  const nameEl = document.createElement('div');
  nameEl.className = 'msg-name';
  nameEl.style.color = color;
  nameEl.textContent = isMine ? myName : (msg.name || '匿名');
  wrap.appendChild(nameEl);
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = msg.text;
  bubble.style.background = faintBg(color);
  bubble.style.color = color;
  wrap.appendChild(bubble);
  msgsEl.appendChild(wrap);
  msgsEl.scrollTop = msgsEl.scrollHeight;
  const all = msgsEl.querySelectorAll('.msg');
  while (all.length > 50) { const f = msgsEl.querySelector('.msg'); if (f) f.remove(); }
}

function clearChatDisplay() {
  msgsEl.querySelectorAll('.msg').forEach(m => m.remove());
  $('msgs-empty').style.display = 'block';
  while (redspas.length) evictOldestRedspa();
}

// ---- Push ----
function push(data) {
  if (!classActive) return;
  db.ref(`classrooms/${ROOM}/messages`).push({
    ...data, studentId: myId, name: myName, color: myColor, timestamp: Date.now()
  });
}

// ---- Text send ----
const sendBtn = $('send-btn'), msgInput = $('msg-input');
sendBtn.addEventListener('click', doSend);
msgInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); } });
msgInput.addEventListener('input', () => {
  sendBtn.disabled = !msgInput.value.trim() || !classActive;
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 90) + 'px';
});

function doSend() {
  const t = msgInput.value.trim();
  if (!t || !classActive) return;
  push({ type: 'text', text: t });
  msgInput.value = ''; msgInput.style.height = 'auto'; sendBtn.disabled = true;
}

// ---- Reactions ----
document.querySelector('.react-strip').addEventListener('click', e => {
  const btn = e.target.closest('.r-btn');
  if (!btn || !classActive) return;
  db.ref(`classrooms/${ROOM}/emojis`).push({ emoji: btn.dataset.e, timestamp: Date.now() });
  btn.style.transform = 'scale(.82)';
  setTimeout(() => btn.style.transform = '', 180);
});

// ---- Emoji float ----
function spawnEmoji(emoji) {
  if (emojiCount >= 10) return;
  emojiCount++;
  const overlay = $('emoji-overlay');
  const el = document.createElement('div');
  el.className = 'float-emoji';
  el.textContent = emoji;
  const x  = 10 + Math.random() * 70;
  const d1 = (Math.random() - .5) * 50;
  el.style.cssText = `left:${x}%; --d1:${d1}px;`;
  overlay.appendChild(el);
  setTimeout(() => { el.remove(); emojiCount--; }, 2500);
}

// ---- Red supa ----
function showRedspa(msg) {
  if (redspas.length >= 3) evictOldestRedspa();
  const card = document.createElement('div');
  card.className = 'rs-card';
  card.innerHTML = `<div class="rs-name">${esc(msg.name)}</div><div class="rs-text">${esc(msg.text)}</div><div class="rs-bar" style="width:100%;transition:width 20s linear;"></div>`;
  rzone.appendChild(card);
  rzone.style.display = 'block';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const b = card.querySelector('.rs-bar');
    if (b) b.style.width = '0%';
  }));
  const tid = setTimeout(() => removeRedspa(card, tid), 20000);
  redspas.push({ el: card, timerId: tid });
}

function evictOldestRedspa() {
  const o = redspas.shift();
  if (!o) return;
  clearTimeout(o.timerId);
  o.el.remove();
  if (!rzone.children.length) rzone.style.display = 'none';
}

function removeRedspa(card, tid) {
  const idx = redspas.findIndex(r => r.timerId === tid);
  if (idx > -1) redspas.splice(idx, 1);
  card.remove();
  if (!rzone.children.length) rzone.style.display = 'none';
}

// ---- Cooldown ----
function checkCooldown() {
  db.ref(`classrooms/${ROOM}/redspa_cd/${myId}`).get().then(snap => {
    if (!snap.exists()) return;
    const rem = snap.val() - Date.now();
    if (rem > 0) startCooldownUI(rem);
  });
}

function startCooldownUI(ms) {
  const btn = $('redspa-btn');
  btn.classList.add('cooling');
  btn.innerHTML = '<span class="cd-text">--:--</span>';
  if (cooldownTimer) clearInterval(cooldownTimer);
  let rem = Math.ceil(ms / 1000);
  const tick = () => {
    if (rem <= 0) {
      clearInterval(cooldownTimer);
      btn.classList.remove('cooling');
      btn.innerHTML = '<svg class="plane-svg" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>';
      return;
    }
    const cd = btn.querySelector('.cd-text');
    if (cd) cd.textContent = `${Math.floor(rem/60)}:${String(rem%60).padStart(2,'0')}`;
    rem--;
  };
  tick();
  cooldownTimer = setInterval(tick, 1000);
}

$('redspa-btn').addEventListener('click', () => {
  const btn = $('redspa-btn');
  if (btn.classList.contains('cooling') || !classActive) return;
  const text = msgInput.value.trim();
  if (!text) { msgInput.focus(); return; }
  db.ref(`classrooms/${ROOM}/redspas`).push({ text, name: myName, color: myColor, studentId: myId, timestamp: Date.now() });
  db.ref(`classrooms/${ROOM}/redspa_cd/${myId}`).set(Date.now() + 3 * 60 * 1000);
  startCooldownUI(3 * 60 * 1000);
  msgInput.value = ''; msgInput.style.height = 'auto'; sendBtn.disabled = true;
});

// ---- Poll ----
$('vote-grid').addEventListener('click', e => {
  const btn = e.target.closest('.v-btn');
  if (!btn || !classActive) return;
  const v = parseInt(btn.dataset.v);
  db.ref(`classrooms/${ROOM}/pollVotes/${myId}`).set({ value: v, timestamp: Date.now() });
  document.querySelectorAll('.v-btn').forEach(b => b.classList.remove('voted'));
  btn.classList.add('voted');
});

function updatePollChart() {
  const total = Object.values(pollVotes).reduce((a, b) => a + b, 0);
  for (let i = 1; i <= 10; i++) {
    const pct = total > 0 ? Math.round((pollVotes[i] || 0) / total * 100) : 0;
    $(`rf${i}`).style.width = pct + '%';
    $(`rc${i}`).textContent = pollVotes[i] || 0;
  }
  $('result-total').textContent = `回答 ${total} 件`;
}

// ---- Q&A ----
const qaInput = $('qa-input');

function updateQaSendBtn() {
  $('qa-send').disabled = !qaInput.value.trim() || !classActive;
}
qaInput.addEventListener('input', updateQaSendBtn);

$('qa-send').addEventListener('click', () => {
  const text = qaInput.value.trim();
  if (!text || !classActive) return;
  db.ref(`classrooms/${ROOM}/qa`).push({
    text:      text,
    name:      myName,
    color:     myColor,
    studentId: myId,
    answered:  false,
    timestamp: Date.now()
  });
  qaInput.value = '';
  qaInput.style.height = 'auto';
  updateQaSendBtn();
});

function makeQaCard(key, data) {
  const card = document.createElement('div');
  card.id = 'qa-' + key;
  card.className = 'qa-card' + (data.answered ? ' answered' : '');
  card.style.borderLeft = '4px solid ' + (data.color || '#CBD5E1');
  const nameEl = document.createElement('div');
  nameEl.className = 'qa-card-name';
  nameEl.style.color = data.color || '#64748B';
  nameEl.textContent = data.name || '匿名';
  card.appendChild(nameEl);
  const textEl = document.createElement('div');
  textEl.className = 'qa-card-text';
  textEl.textContent = data.text;
  card.appendChild(textEl);
  if (data.studentId === myId) {
    const delBtn = document.createElement('button');
    delBtn.className = 'qa-card-del';
    delBtn.textContent = '🗑';
    delBtn.title = '削除';
    delBtn.addEventListener('click', () => {
      if (confirm('この質問を削除しますか？')) {
        db.ref(`classrooms/${ROOM}/qa/` + key).remove();
      }
    });
    card.appendChild(delBtn);
  }
  return card;
}

function addQaCard(key, data) {
  const container = document.getElementById('qa-list');
  if (!container) return;
  const empty = document.getElementById('qa-empty');
  if (empty) empty.remove();
  // 新しい投稿を先頭に挿入
  const card = makeQaCard(key, data);
  container.insertBefore(card, container.firstChild);
}

function updateQaCard(key, data) {
  const existing = document.getElementById('qa-' + key);
  if (!existing) return;
  existing.className = 'qa-card' + (data.answered ? ' answered' : '');
}

function removeQaCard(key) {
  const el = document.getElementById('qa-' + key);
  if (el) el.remove();
  const container = document.getElementById('qa-list');
  if (container && container.children.length === 0) {
    const d = document.createElement('div');
    d.className = 'qa-empty'; d.id = 'qa-empty';
    d.textContent = 'まだ質問はありません';
    container.appendChild(d);
  }
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
