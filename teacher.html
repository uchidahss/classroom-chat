<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>授業チャット — 先生</title>
<style>
:root {
  --primary: #4F46E5;
  --primary-bg: #EEF2FF;
  --red: #EF4444;
  --red-bg: #FFF1F2;
  --red-border: #FECDD3;
  --tea: #0F766E;
  --tea-bg: #CCFBF1;
  --surface: #FFFFFF;
  --bg: #F1F5F9;
  --border: #E2E8F0;
  --text: #1E293B;
  --muted: #64748B;
  --radius: 14px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body { font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN',sans-serif; background:var(--bg); color:var(--text); }

/* ===== SETUP ===== */
#setup { height:100dvh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem 1.5rem; gap:1.75rem; background:var(--surface); }
.setup-icon { width:68px; height:68px; border-radius:20px; background:var(--tea); display:flex; align-items:center; justify-content:center; }
.setup-icon svg { width:34px; height:34px; fill:white; }
.setup-title { text-align:center; }
.setup-title h1 { font-size:1.4rem; font-weight:700; margin-bottom:.35rem; }
.setup-title p { font-size:.85rem; color:var(--muted); line-height:1.6; }
.setup-form { width:100%; max-width:300px; display:flex; flex-direction:column; gap:1rem; }
.form-group label { display:block; font-size:.75rem; font-weight:700; color:var(--muted); margin-bottom:.35rem; }
.form-group input { width:100%; padding:.75rem 1rem; border:1.5px solid var(--border); border-radius:var(--radius); font-size:.95rem; font-family:inherit; outline:none; background:var(--bg); transition:border-color .2s; }
.form-group input:focus { border-color:var(--tea); background:var(--surface); }
.code-box { background:var(--tea-bg); border-radius:var(--radius); padding:1rem; text-align:center; }
.code-big { font-family:'SF Mono',monospace; font-size:2.2rem; font-weight:800; letter-spacing:.6rem; color:var(--tea); display:block; margin-bottom:.3rem; }
.code-hint { font-size:.75rem; color:var(--tea); }
.regen-btn { background:none; border:none; font-size:.75rem; color:var(--muted); text-decoration:underline; cursor:pointer; display:block; margin:.3rem auto 0; }
#start-btn { width:100%; padding:.9rem; background:var(--tea); color:white; border:none; border-radius:var(--radius); font-size:1rem; font-weight:700; cursor:pointer; }
#start-btn:active { opacity:.85; }

/* ===== APP ===== */
#app { display:none; height:100dvh; overflow-y:scroll; scroll-snap-type:y mandatory; -webkit-overflow-scrolling:touch; }
.section { height:100dvh; scroll-snap-align:start; display:flex; flex-direction:column; overflow:hidden; background:var(--surface); }

/* Header */
.s-head { flex-shrink:0; height:50px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 1rem; gap:.625rem; }
.room-pill { font-size:.7rem; font-weight:800; letter-spacing:.06rem; padding:.2rem .65rem; border-radius:100px; background:var(--tea-bg); color:var(--tea); }
.teacher-badge { font-size:.68rem; font-weight:700; padding:.15rem .55rem; border-radius:100px; background:var(--tea); color:white; }
.s-title { font-size:.9rem; font-weight:600; flex:1; }
.icon-btn { width:32px; height:32px; border-radius:8px; background:var(--bg); border:1px solid var(--border); font-size:.88rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.icon-btn:active { opacity:.7; }

/* ===== REDSPA ZONE ===== */
#redspa-zone { flex-shrink:0; background:var(--red-bg); border-bottom:1px solid var(--red-border); display:none; }
.rs-card { padding:6px 12px 8px; border-bottom:1px solid var(--red-border); position:relative; overflow:hidden; }
.rs-card:last-child { border-bottom:none; }
.rs-name { font-size:.65rem; font-weight:800; color:#BE123C; margin-bottom:2px; display:flex; align-items:center; gap:4px; }
.rs-name::before { content:'🔴'; font-size:.7rem; }
.rs-text { font-size:.9rem; color:var(--text); line-height:1.4; word-break:break-word; }
.rs-bar { position:absolute; bottom:0; left:0; height:3px; background:var(--red); border-radius:0 2px 2px 0; }

/* ===== CHAT AREA ===== */
#chat-wrap { flex:1; position:relative; overflow:hidden; }
#msgs { height:100%; overflow-y:auto; padding:.875rem .875rem .5rem; display:flex; flex-direction:column; gap:.55rem; scroll-behavior:smooth; }
#msgs-empty { margin:auto; text-align:center; color:var(--muted); font-size:.85rem; line-height:2; }
.msg { display:flex; flex-direction:column; animation:fadeUp .28s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.msg-name { font-size:.66rem; font-weight:700; margin-bottom:.2rem; padding:0 .35rem; color:var(--muted); }
.msg-bubble { max-width:85%; padding:.55rem .85rem; border-radius:16px 16px 16px 4px; background:var(--bg); font-size:.93rem; line-height:1.5; word-break:break-word; }

/* Emoji float overlay */
#emoji-overlay { position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:10; }
.float-emoji { position:absolute; bottom:0; font-size:1.8rem; pointer-events:none; animation:floatUp 2.5s ease-out forwards; line-height:1; }
@keyframes floatUp {
  0%   { opacity:1;   transform:translateY(0)     translateX(0); }
  25%  { opacity:.9;  transform:translateY(-22vh) translateX(var(--d1)); }
  60%  { opacity:.65; transform:translateY(-56vh) translateX(var(--d2)); }
  100% { opacity:0;   transform:translateY(-88vh) translateX(var(--d3)); }
}

/* ===== SECTION 2: POLL ===== */
#s-poll { background:var(--bg); }
#s-poll .s-head { background:var(--surface); }
.poll-body { flex:1; overflow-y:auto; padding:1rem .875rem; display:flex; flex-direction:column; gap:.875rem; }
.poll-sect-label { font-size:.72rem; font-weight:700; color:var(--muted); margin-bottom:.4rem; }
.result-rows { display:flex; flex-direction:column; gap:.4rem; }
.r-row { display:flex; align-items:center; gap:.55rem; }
.r-num { font-size:.82rem; font-weight:800; color:var(--text); width:18px; text-align:right; }
.r-track { flex:1; height:22px; background:var(--border); border-radius:4px; overflow:hidden; }
.r-fill { height:100%; background:var(--primary); border-radius:4px; transition:width .5s ease; width:0%; }
.r-count { font-size:.75rem; color:var(--muted); width:24px; text-align:right; }
.result-total { font-size:.75rem; color:var(--muted); text-align:right; margin-top:.25rem; }
#clear-poll { width:100%; padding:.65rem; border:1.5px solid var(--red); border-radius:var(--radius); background:none; color:var(--red); font-size:.85rem; font-weight:600; cursor:pointer; margin-top:.25rem; }
#clear-poll:active { background:#FEF2F2; }

/* ===== DOT NAV ===== */
#dot-nav { position:fixed; right:10px; top:50%; transform:translateY(-50%); display:none; flex-direction:column; gap:6px; z-index:100; }
.d { width:6px; height:6px; border-radius:3px; background:rgba(100,116,139,.35); transition:height .25s,background .25s; cursor:pointer; }
.d.on { height:16px; background:var(--tea); }
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="setup-icon"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></div>
  <div class="setup-title">
    <h1>授業チャット <small style="font-size:.8rem;color:var(--tea);">先生</small></h1>
    <p>ルームコードを学生に伝えてください<br>学生は student.html から参加します</p>
  </div>
  <div class="setup-form">
    <div class="form-group">
      <label>科目・クラス名（任意）</label>
      <input type="text" id="subject-input" placeholder="例: デザイン基礎 1年A組">
    </div>
    <div class="code-box">
      <span class="code-big" id="code-display">----</span>
      <span class="code-hint">このコードを学生に伝えてください</span>
      <button class="regen-btn" id="regen-btn">↺ 別のコードを生成</button>
    </div>
    <button id="start-btn">授業を開始する →</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- Section 1: Chat -->
  <section class="section" id="s-chat">
    <div class="s-head">
      <span class="room-pill" id="room-pill">----</span>
      <span class="teacher-badge">先生</span>
      <span class="s-title" id="s-title">チャット</span>
      <button class="icon-btn" id="clear-btn" title="表示をクリア">🗑</button>
    </div>

    <!-- 赤スパエリア -->
    <div id="redspa-zone"></div>

    <!-- チャット本体 -->
    <div id="chat-wrap">
      <div id="msgs"><div id="msgs-empty">学生からのメッセージがここに表示されます</div></div>
      <div id="emoji-overlay"></div>
    </div>
  </section>

  <!-- Section 2: Poll -->
  <section class="section" id="s-poll">
    <div class="s-head">
      <span class="room-pill" id="room-pill2">----</span>
      <span class="teacher-badge">先生</span>
      <span class="s-title">アンケート結果</span>
    </div>
    <div class="poll-body">
      <div>
        <div class="poll-sect-label">回答結果（1〜10）</div>
        <div class="result-rows" id="result-rows"></div>
        <div class="result-total" id="result-total">回答 0 件</div>
      </div>
      <button id="clear-poll">🗑 アンケート結果をリセット</button>
    </div>
  </section>

</div>

<!-- Dot nav -->
<div id="dot-nav">
  <div class="d on"></div>
  <div class="d"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<script>
/* ================================================================
   ★ Firebase 設定をここに貼り付けてください（student / teacher 共通）
   ================================================================ */
const firebaseConfig = {
  apiKey:            "AIzaSyDrdXls9DSQdtRTu-7vf882lqM2h7Q37Gc",
  authDomain:        "classroom-chat-59e41.firebaseapp.com",
  databaseURL:       "https://classroom-chat-59e41-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "YOUR_PROJECT_ID",
  storageBucket:     "YOUR_PROJECT_ID.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId:             "YOUR_APP_ID"
};
/* ================================================================ */

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let roomCode   = null;
let pollVotes  = {};
let emojiCount = 0;

const $ = id => document.getElementById(id);

// ---- Poll chart init ----
(function(){
  const rows = $('result-rows');
  for(let i=1;i<=10;i++){
    rows.innerHTML += `<div class="r-row"><span class="r-num">${i}</span><div class="r-track"><div class="r-fill" id="rf${i}"></div></div><span class="r-count" id="rc${i}">0</span></div>`;
  }
})();

// ---- Room code generation ----
const CHARS = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
function genCode(){ return Array.from({length:4},()=>CHARS[Math.floor(Math.random()*CHARS.length)]).join(''); }
let code = genCode();
$('code-display').textContent = code;
$('regen-btn').addEventListener('click', ()=>{ code=genCode(); $('code-display').textContent=code; });

// ---- Start room ----
$('start-btn').addEventListener('click', async ()=>{
  roomCode = code;
  const subject = $('subject-input').value.trim() || '授業チャット';
  await db.ref(`classrooms/${roomCode}/settings`).set({ subject, createdAt:Date.now() });
  $('room-pill').textContent  = roomCode;
  $('room-pill2').textContent = roomCode;
  $('s-title').textContent    = subject;
  $('setup').style.display    = 'none';
  $('app').style.display      = 'block';
  $('dot-nav').style.display  = 'flex';
  startListening();
});

// ---- Listeners ----
function startListening() {
  const t0 = Date.now();
  let ready = false;
  setTimeout(()=>ready=true, 400);

  // Messages
  db.ref(`classrooms/${roomCode}/messages`)
    .orderByChild('timestamp').startAt(t0)
    .on('child_added', snap=>{ if(ready) renderMsg(snap.val(), snap.key); });

  // Red spas
  db.ref(`classrooms/${roomCode}/redspas`)
    .orderByChild('timestamp').startAt(t0)
    .on('child_added', snap=>{ if(ready) showRedspa(snap.val()); });

  // Emoji animations
  db.ref(`classrooms/${roomCode}/emojis`)
    .orderByChild('timestamp').startAt(t0)
    .on('child_added', snap=>{ if(ready) spawnEmoji(snap.val().emoji); });

  // Poll
  db.ref(`classrooms/${roomCode}/pollVotes`).on('value', snap=>{
    pollVotes={};
    snap.forEach(c=>{ const v=c.val().value; if(v>=1&&v<=10) pollVotes[v]=(pollVotes[v]||0)+1; });
    updatePollChart();
  });
}

// ---- Render message ----
const msgsEl = $('msgs');
const shownIds = new Set();

function renderMsg(msg, key) {
  if(shownIds.has(key)) return;
  shownIds.add(key);
  $('msgs-empty').style.display='none';
  const wrap = document.createElement('div');
  wrap.className = 'msg';
  const name = document.createElement('div');
  name.className = 'msg-name';
  name.style.color = msg.color||'#64748B';
  name.textContent = msg.name||'匿名';
  wrap.appendChild(name);
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = msg.text||'';
  bubble.style.borderLeft = `3px solid ${msg.color||'#CBD5E1'}`;
  wrap.appendChild(bubble);
  msgsEl.appendChild(wrap);
  msgsEl.scrollTop = msgsEl.scrollHeight;
  const all = msgsEl.querySelectorAll('.msg');
  while(all.length>50){ const f=msgsEl.querySelector('.msg'); if(f) f.remove(); }
}

// ---- Red supa ----
const redspas = [];
const rzone   = $('redspa-zone');

function showRedspa(msg) {
  if(redspas.length>=3) evictOldestRedspa();
  const card = document.createElement('div');
  card.className = 'rs-card';
  card.innerHTML = `<div class="rs-name">${msg.name}</div><div class="rs-text">${escHtml(msg.text)}</div><div class="rs-bar" style="width:100%;transition:width 10s linear;"></div>`;
  rzone.appendChild(card);
  rzone.style.display='block';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ const b=card.querySelector('.rs-bar'); if(b) b.style.width='0%'; }));
  const tid = setTimeout(()=>removeRedspa(card,tid), 10000);
  redspas.push({el:card, timerId:tid});
}

function evictOldestRedspa() {
  const oldest=redspas.shift();
  if(!oldest) return;
  clearTimeout(oldest.timerId);
  oldest.el.remove();
  if(!rzone.children.length) rzone.style.display='none';
}

function removeRedspa(card, tid) {
  const idx=redspas.findIndex(r=>r.timerId===tid);
  if(idx>-1) redspas.splice(idx,1);
  card.remove();
  if(!rzone.children.length) rzone.style.display='none';
}

// ---- Emoji float animation ----
function spawnEmoji(emoji) {
  if(emojiCount>=10) return;
  emojiCount++;
  const overlay=$('emoji-overlay');
  const el=document.createElement('div');
  el.className='float-emoji';
  el.textContent=emoji;
  const x=10+Math.random()*70;
  const d1=(Math.random()-.5)*40, d2=(Math.random()-.5)*60, d3=(Math.random()-.5)*30;
  el.style.cssText=`left:${x}%; --d1:${d1}px; --d2:${d2}px; --d3:${d3}px;`;
  overlay.appendChild(el);
  setTimeout(()=>{ el.remove(); emojiCount--; }, 2500);
}

// ---- Poll chart ----
function updatePollChart() {
  const total=Object.values(pollVotes).reduce((a,b)=>a+b,0);
  for(let i=1;i<=10;i++){
    const pct=total>0?Math.round((pollVotes[i]||0)/total*100):0;
    $(`rf${i}`).style.width=pct+'%';
    $(`rc${i}`).textContent=pollVotes[i]||0;
  }
  $('result-total').textContent=`回答 ${total} 件`;
}

// ---- Clear chat display ----
$('clear-btn').addEventListener('click',()=>{
  if(!confirm('チャット表示をクリアしますか？')) return;
  msgsEl.querySelectorAll('.msg').forEach(m=>m.remove());
  shownIds.clear();
  $('msgs-empty').style.display='block';
});

// ---- Clear poll ----
$('clear-poll').addEventListener('click',()=>{
  if(!confirm('アンケート結果をリセットしますか？')) return;
  db.ref(`classrooms/${roomCode}/pollVotes`).remove();
});

// ---- Dot nav ----
const appEl=$('app');
appEl.addEventListener('scroll',()=>{
  const idx=Math.round(appEl.scrollTop/window.innerHeight);
  document.querySelectorAll('#dot-nav .d').forEach((d,i)=>d.classList.toggle('on',i===idx));
},{passive:true});
document.querySelectorAll('#dot-nav .d').forEach((d,i)=>{
  d.addEventListener('click',()=>appEl.scrollTo({top:i*window.innerHeight,behavior:'smooth'}));
});

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
